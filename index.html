<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Calorías — Volumen Pre-Verano</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');

  :root {
    --bg: #0f0f0e;
    --surface: #1a1a18;
    --surface2: #242422;
    --border: #2e2e2b;
    --text: #e8e6df;
    --muted: #6b6960;
    --accent: #c8f060;
    --accent-dim: #8aaa3a;
    --warn: #f0a030;
    --danger: #f04040;
    --protein: #60b8f0;
    --carbs: #f0c840;
    --fat: #f07840;
    --gym: #c8f060;
    --run: #60f0c8;
    --climb: #f060c8;
    --rest: #6080f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    padding: 24px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--accent);
    line-height: 1;
  }

  .logo span {
    font-style: italic;
    font-weight: 300;
    color: var(--muted);
    font-size: 14px;
    margin-left: 8px;
  }

  /* Day type selector */
  .day-selector {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .day-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-right: 4px;
  }

  .day-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .day-btn:hover { border-color: var(--text); color: var(--text); }
  .day-btn.active[data-type="gym"] { background: var(--gym); color: #0f0f0e; border-color: var(--gym); }
  .day-btn.active[data-type="run"] { background: var(--run); color: #0f0f0e; border-color: var(--run); }
  .day-btn.active[data-type="climb"] { background: var(--climb); color: #0f0f0e; border-color: var(--climb); }
  .day-btn.active[data-type="rest"] { background: var(--rest); color: #fff; border-color: var(--rest); }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    flex: 1;
    min-height: 0;
  }

  /* Chat area */
  .chat-area {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 400px;
    max-height: 65vh;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-items: flex-end; }
  .msg.assistant { align-items: flex-start; }

  .msg-role {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .msg-bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .msg.user .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .msg.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* Macro chips inside message */
  .macro-result {
    margin-top: 10px;
    padding: 10px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .macro-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .chip {
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .chip.kcal { background: rgba(200,240,96,0.15); color: var(--accent); border: 1px solid rgba(200,240,96,0.3); }
  .chip.prot { background: rgba(96,184,240,0.12); color: var(--protein); border: 1px solid rgba(96,184,240,0.25); }
  .chip.carbs { background: rgba(240,200,64,0.12); color: var(--carbs); border: 1px solid rgba(240,200,64,0.25); }
  .chip.fat { background: rgba(240,120,64,0.12); color: var(--fat); border: 1px solid rgba(240,120,64,0.25); }

  /* Loading dots */
  .loading-bubble {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); background: var(--accent); }
  }

  /* Input area */
  .input-area {
    padding: 16px 32px 24px;
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 14px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0f0f0e;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 18px;
  }
  .send-btn:hover { background: #d8ff70; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* Sidebar: totals */
  .sidebar {
    padding: 24px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .sidebar-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  /* Target card */
  .target-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .target-type {
    font-size: 12px;
    margin-bottom: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .type-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Progress bars */
  .macro-bar-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .macro-bar-item { display: flex; flex-direction: column; gap: 4px; }

  .macro-bar-header {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  .macro-bar-header .val {
    color: var(--text);
    font-weight: 500;
  }

  .bar-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
    max-width: 100%;
  }

  .bar-fill.kcal { background: var(--accent); }
  .bar-fill.prot { background: var(--protein); }
  .bar-fill.carbs { background: var(--carbs); }
  .bar-fill.fat { background: var(--fat); }
  .bar-fill.over { background: var(--danger); }

  /* Total kcal display */
  .kcal-big {
    text-align: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .kcal-number {
    font-family: 'Fraunces', serif;
    font-size: 42px;
    font-weight: 600;
    line-height: 1;
    color: var(--accent);
  }

  .kcal-number.warn { color: var(--warn); }
  .kcal-number.danger { color: var(--danger); }

  .kcal-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Food log */
  .food-log {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .food-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    gap: 8px;
  }

  .food-name {
    color: var(--text);
    flex: 1;
    line-height: 1.3;
    white-space: pre-wrap;
  }

  .food-kcal {
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
  }
  .del-btn:hover { color: var(--danger); }

  /* Reset btn */
  .reset-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .reset-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Status badge */
  .status-badge {
    padding: 4px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .status-badge.good { background: rgba(200,240,96,0.12); color: var(--accent); border: 1px solid rgba(200,240,96,0.2); }
  .status-badge.warn { background: rgba(240,160,48,0.12); color: var(--warn); border: 1px solid rgba(240,160,48,0.2); }
  .status-badge.over { background: rgba(240,64,64,0.12); color: var(--danger); border: 1px solid rgba(240,64,64,0.2); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.7;
    border: 1px dashed var(--border);
    border-radius: 10px;
  }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { border-top: 1px solid var(--border); max-height: 400px; }
    header, .day-selector { padding-left: 16px; padding-right: 16px; }
    .messages, .input-area { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">kcal<span>/ volumen pre-verano</span></div>
</header>

<div class="day-selector">
  <span class="day-label">Hoy es</span>
  <button class="day-btn active" data-type="gym" onclick="setDayType('gym', this)">🏋️ Gym fuerza</button>
  <button class="day-btn" data-type="run" onclick="setDayType('run', this)">🏃 Running</button>
  <button class="day-btn" data-type="climb" onclick="setDayType('climb', this)">🧗 Escalada</button>
  <button class="day-btn" data-type="rest" onclick="setDayType('rest', this)">😴 Descanso</button>
</div>

<div class="main">
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="input"
          placeholder="Ej: desayuno — 3 huevos revueltos, 2 tostadas con aceite de oliva y un café con leche"
          rows="2"
          onkeydown="handleKey(event)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()" title="Enviar">↑</button>
      </div>
      <div class="input-hint">Enter para enviar · Shift+Enter para nueva línea</div>
    </div>
  </div>

  <div class="sidebar">
    <div>
      <div class="sidebar-title" style="margin-bottom:12px">Objetivo del día</div>
      <div class="target-card">
        <div class="target-type">
          <div class="type-dot" id="typeDot" style="background: var(--gym)"></div>
          <span id="typeLabel">Gym fuerza — 2.950 kcal</span>
        </div>
        <div class="kcal-big">
          <div class="kcal-number" id="totalKcal">0</div>
          <div class="kcal-sub">kcal consumidas · <span id="remaining">2950 restantes</span></div>
        </div>
        <div class="macro-bar-group">
          <div class="macro-bar-item">
            <div class="macro-bar-header">
              <span>Proteína</span>
              <span class="val"><span id="curProt">0</span> / <span id="tgtProt">160</span> g</span>
            </div>
            <div class="bar-track"><div class="bar-fill prot" id="barProt" style="width:0%"></div></div>
          </div>
          <div class="macro-bar-item">
            <div class="macro-bar-header">
              <span>Carbohidratos</span>
              <span class="val"><span id="curCarbs">0</span> / <span id="tgtCarbs">390</span> g</span>
            </div>
            <div class="bar-track"><div class="bar-fill carbs" id="barCarbs" style="width:0%"></div></div>
          </div>
          <div class="macro-bar-item">
            <div class="macro-bar-header">
              <span>Grasa</span>
              <span class="val"><span id="curFat">0</span> / <span id="tgtFat">84</span> g</span>
            </div>
            <div class="bar-track"><div class="bar-fill fat" id="barFat" style="width:0%"></div></div>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="sidebar-title" style="margin-bottom:10px">Lo registrado hoy</div>
      <div class="food-log" id="foodLog">
        <div class="empty-state" id="emptyState">
          Aún no has registrado nada.<br>Cuéntame lo que has comido.
        </div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetDay()">↺ Resetear día</button>
  </div>
</div>

<script>
const TARGETS = {
  gym:   { label: 'Gym fuerza — 2.950 kcal', kcal: 2950, prot: 160, carbs: 390, fat: 84, color: 'var(--gym)' },
  run:   { label: 'Running — 2.750 kcal',     kcal: 2750, prot: 155, carbs: 355, fat: 79, color: 'var(--run)' },
  climb: { label: 'Escalada — 2.900 kcal',    kcal: 2900, prot: 160, carbs: 375, fat: 84, color: 'var(--climb)' },
  rest:  { label: 'Descanso — 2.450 kcal',    kcal: 2450, prot: 150, carbs: 295, fat: 74, color: 'var(--rest)' },
};

let dayType = 'gym';
let totals = { kcal: 0, prot: 0, carbs: 0, fat: 0 };
let foodEntries = [];
let isLoading = false;
let chatHistory = [];

function getStorageKey() {
  const d = new Date();
  return `kcal_tracker_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
}

function saveState() {
  const state = { dayType, totals, foodEntries, chatHistory };
  localStorage.setItem(getStorageKey(), JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(getStorageKey());
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (state.dayType) dayType = state.dayType;
    if (state.totals) totals = state.totals;
    if (state.foodEntries) foodEntries = state.foodEntries;
    if (state.chatHistory) chatHistory = state.chatHistory;
    return true;
  } catch (e) {
    console.error('Error loading state:', e);
    return false;
  }
}

function renderChatHistory() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  chatHistory.forEach(msg => {
    if (msg.role === 'user') {
      appendMessage('user', msg.content);
    } else {
      let text = msg.content;
      let macro = null;
      const m = text.match(/<<<MACROS>>>\s*([\s\S]*?)\s*<<<END>>>/);
      if (m) {
        try { macro = JSON.parse(m[1]); text = text.replace(/<<<MACROS>>>[\s\S]*?<<<END>>>/, '').trim(); } catch(e){}
      }
      appendMessage('assistant', text, macro);
    }
  });
}

// ── DESAYUNO FIJO ──────────────────────────────────────────────
const DESAYUNO_FIJO = {
  entries: [
    { label: 'Desayuno 1 — avena + yogur griego + arándanos + frutos secos + miel', kcal: 560, prot: 24.5, carbs: 62, fat: 22.3 },
    { label: 'Vaso de leche (250 ml) + creatina 5g', kcal: 120, prot: 8, carbs: 12, fat: 4.5 },
    { label: 'Segundo desayuno — pan integral + queso + jamón ibérico + aceite + aguacate + manzana', kcal: 577, prot: 18.1, carbs: 62, fat: 28.2 },
  ],
  totalKcal: 1257,
  totalProt: 50.6,
  totalCarbs: 136,
  totalFat: 55,
};

const DESAYUNO_FIJO_TRIGGERS = [
  'desayuno fijo', 'desayuno de siempre', 'desayuno habitual',
  'mi desayuno', 'el desayuno de siempre', 'desayuno normal',
  'poner desayuno fijo', 'añadir desayuno fijo',
];

const SYSTEM_PROMPT = `Eres un asistente de nutrición deportiva especializado en conteo de calorías y macronutrientes para un plan de volumen muscular. 

PERFIL DEL USUARIO:
- Hombre, 185 cm, 81,1 kg, físico delgado-atlético
- Objetivo: fase de volumen pre-verano, ganar ~0,3 kg/semana hasta 83,5-84,5 kg
- Prioridad: hipertrofia de tren superior, mantiene running 1-2x/semana y escalada
- Proteína objetivo: ~160 g/día (~2 g/kg)

TARGETS SEGÚN TIPO DE DÍA:
- 🏋️ Gym fuerza: 2950 kcal | P: 160g | C: 390g | G: 84g
- 🏃 Running: 2750 kcal | P: 155g | C: 355g | G: 79g
- 🧗 Escalada: 2900 kcal | P: 160g | C: 375g | G: 84g
- 😴 Descanso: 2450 kcal | P: 150g | C: 295g | G: 74g

DESAYUNO FIJO GUARDADO (ya conoces estos datos, no los estimes de nuevo):
- Bol de avena (40g) + yogur griego (150g) + arándanos + frutos secos (30g) + miel: ~560 kcal | P:24.5g | C:62g | G:22.3g
- Vaso de leche (250ml) + creatina 5g: ~120 kcal | P:8g | C:12g | G:4.5g
- Pan integral (90g) + queso + jamón ibérico + aceite + aguacate + manzana: ~577 kcal | P:18.1g | C:62g | G:28.2g
- TOTAL DESAYUNO FIJO: ~1.257 kcal | P:50.6g | C:136g | G:55g

DESAYUNO FIJO DEL USUARIO (base diaria, siempre incluido):
Si el usuario dice "desayuno fijo", "mi desayuno de siempre" o similar, ya conoces los números exactos:

Desayuno 1 — avena + yogur + frutos secos + leche:
- Avena 40g: 140 kcal | P:5g C:24g G:2.5g
- Yogur griego 111g (~1kg/9días): 108 kcal | P:10g C:4.4g G:5.5g
- Arándanos 5 unidades (~15g): 8 kcal | P:0g C:2g G:0g
- Frutos secos 30g: 185 kcal | P:5g C:6g G:16g
- Miel 1 cda (20g): 60 kcal | P:0g C:16g G:0g
- Leche 250ml: 120 kcal | P:8g C:12g G:4.5g
Subtotal: 621 kcal | P:28g | C:64g | G:28.5g

Segundo desayuno — bocadillo + manzana:
- Pan integral 90g: 215 kcal | P:7g C:40g G:2g
- Queso 1 loncha 20g: 70 kcal | P:4g C:0g G:6g
- Jamón york 2 lonchas 40g: 50 kcal | P:7g C:1g G:1.5g
- Aceite oliva 10g: 88 kcal | P:0g C:0g G:10g
- Aguacate ~40g: 64 kcal | P:0.8g C:3g G:5.5g
- Manzana 150g: 75 kcal | P:0.3g C:19g G:0.2g
Subtotal: 562 kcal | P:19g | C:63g | G:25g

TOTAL DESAYUNO FIJO: ~1.183 kcal | P: 47g | C: 127g | G: 53.5g

Cuando el usuario diga "desayuno fijo", registra ambas partes juntas con estos números exactos y avisa de cuánta proteína queda pendiente para el resto del día.

TU FUNCIÓN:
Cuando el usuario te diga lo que ha comido, debes:
1. Estimar las calorías y macros de cada alimento con realismo
2. Dar el total de esa comida/alimento
3. Responder en JSON con este formato EXACTO al final de tu respuesta (después del texto):

<<<MACROS>>>
{"kcal": NUMBER, "prot": NUMBER, "carbs": NUMBER, "fat": NUMBER, "label": "nombre corto del alimento"}
<<<END>>>

Antes del JSON, da una respuesta breve y natural en español (1-3 frases) confirmando lo que has calculado y algún dato relevante si aplica.

Si el usuario hace preguntas generales sobre nutrición, responde normalmente sin el bloque JSON.
Si algo es ambiguo (tamaño de porción, tipo de alimento), haz una estimación razonable y menciónalo.
Sé preciso pero sin ser pedante. Respuestas cortas y directas.`;

function setDayType(type, btn) {
  dayType = type;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  if (!btn) btn = document.querySelector(`.day-btn[data-type="${type}"]`);
  if (btn) btn.classList.add('active');
  const t = TARGETS[type];
  document.getElementById('typeDot').style.background = t.color;
  document.getElementById('typeLabel').textContent = t.label;
  document.getElementById('tgtProt').textContent = t.prot;
  document.getElementById('tgtCarbs').textContent = t.carbs;
  document.getElementById('tgtFat').textContent = t.fat;
  updateBars();
  saveState();
}

function updateBars() {
  const t = TARGETS[dayType];
  const { kcal, prot, carbs, fat } = totals;

  const kcalEl = document.getElementById('totalKcal');
  kcalEl.textContent = Math.round(kcal);
  kcalEl.className = 'kcal-number' + (kcal > t.kcal * 1.1 ? ' danger' : kcal > t.kcal * 0.95 ? ' warn' : '');

  const rem = Math.round(t.kcal - kcal);
  document.getElementById('remaining').textContent = rem > 0 ? `${rem} restantes` : `${Math.abs(rem)} de exceso`;

  const setPct = (barId, cur, tgt) => {
    const pct = Math.min((cur / tgt) * 100, 100);
    const bar = document.getElementById(barId);
    bar.style.width = pct + '%';
    bar.className = 'bar-fill ' + barId.replace('bar', '').toLowerCase() + (cur > tgt * 1.1 ? ' over' : '');
  };

  document.getElementById('curProt').textContent = Math.round(prot);
  document.getElementById('curCarbs').textContent = Math.round(carbs);
  document.getElementById('curFat').textContent = Math.round(fat);

  setPct('barProt', prot, t.prot);
  setPct('barCarbs', carbs, t.carbs);
  setPct('barFat', fat, t.fat);
}

function addFoodEntry(label, kcal, prot, carbs, fat) {
  const id = Date.now() + Math.random();
  foodEntries.push({ id, label, kcal, prot, carbs, fat });
  totals.kcal += kcal;
  totals.prot += prot;
  totals.carbs += carbs;
  totals.fat += fat;
  renderFoodLog();
  updateBars();
  saveState();
}

function removeEntry(id) {
  const idx = foodEntries.findIndex(e => e.id === id);
  if (idx === -1) return;
  const e = foodEntries[idx];
  totals.kcal -= e.kcal;
  totals.prot -= e.prot;
  totals.carbs -= e.carbs;
  totals.fat -= e.fat;
  foodEntries.splice(idx, 1);
  renderFoodLog();
  updateBars();
  saveState();
}

function renderFoodLog() {
  const log = document.getElementById('foodLog');
  const empty = document.getElementById('emptyState');
  if (foodEntries.length === 0) {
    log.innerHTML = '';
    log.appendChild(empty || createEmptyState());
    return;
  }
  log.innerHTML = foodEntries.map(e => `
    <div class="food-item">
      <div class="food-name">${e.label}</div>
      <div class="food-kcal">${Math.round(e.kcal)} kcal</div>
      <button class="del-btn" onclick="removeEntry(${e.id})" title="Eliminar">×</button>
    </div>
  `).join('');
}

function createEmptyState() {
  const d = document.createElement('div');
  d.className = 'empty-state';
  d.id = 'emptyState';
  d.innerHTML = 'Aún no has registrado nada.<br>Cuéntame lo que has comido.';
  return d;
}

function appendMessage(role, text, macroData) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  let html = `<div class="msg-role">${role === 'user' ? 'tú' : 'kcal·ai'}</div>`;
  html += `<div class="msg-bubble">${escapeHtml(text)}`;

  if (macroData) {
    html += `<div class="macro-result">
      <div class="macro-row">
        <span class="chip kcal">⚡ ${Math.round(macroData.kcal)} kcal</span>
        <span class="chip prot">P: ${Math.round(macroData.prot)}g</span>
        <span class="chip carbs">C: ${Math.round(macroData.carbs)}g</span>
        <span class="chip fat">G: ${Math.round(macroData.fat)}g</span>
      </div>
    </div>`;
  }

  html += `</div>`;
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showLoading() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'loadingMsg';
  div.innerHTML = `
    <div class="msg-role">kcal·ai</div>
    <div class="loading-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function isDesayunoFijo(text) {
  const lower = text.toLowerCase().trim();
  return DESAYUNO_FIJO_TRIGGERS.some(t => lower.includes(t));
}

function loadDesayunoFijo() {
  DESAYUNO_FIJO.entries.forEach(e => {
    addFoodEntry(e.label, e.kcal, e.prot, e.carbs, e.fat);
  });

  const t = TARGETS[dayType];
  const remKcal = Math.round(t.kcal - totals.kcal);
  const remProt = Math.round(t.prot - totals.prot);

  const msg = `✅ Desayuno fijo cargado — ${DESAYUNO_FIJO.totalKcal} kcal · P:${DESAYUNO_FIJO.totalProt}g · C:${DESAYUNO_FIJO.totalCarbs}g · G:${DESAYUNO_FIJO.totalFat}g\n\nTe quedan por meter hoy: ${remKcal} kcal y ${remProt}g de proteína. La proteína es lo más crítico — intenta que comida y cena sean densas en proteína (pollo, huevo, atún, legumbres).`;

  appendMessage('assistant', msg, null);
  chatHistory.push({ role: 'user', content: 'desayuno fijo' });
  chatHistory.push({ role: 'assistant', content: msg });
  saveState();
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';

  appendMessage('user', text);

  // ── Shortcut: desayuno fijo ──
  if (isDesayunoFijo(text)) {
    loadDesayunoFijo();
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    return;
  }

  chatHistory.push({ role: 'user', content: text });
  saveState();
  showLoading();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT + `\n\nDÍA ACTUAL: ${TARGETS[dayType].label}`,
        messages: chatHistory,
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || 'Error al obtener respuesta.';

    // Parse macro block
    const macroMatch = fullText.match(/<<<MACROS>>>\s*([\s\S]*?)\s*<<<END>>>/);
    let macroData = null;
    let displayText = fullText;

    if (macroMatch) {
      try {
        macroData = JSON.parse(macroMatch[1]);
        displayText = fullText.replace(/<<<MACROS>>>[\s\S]*?<<<END>>>/, '').trim();
        addFoodEntry(macroData.label || 'Alimento', macroData.kcal, macroData.prot, macroData.carbs, macroData.fat);
      } catch(e) {}
    }

    hideLoading();
    appendMessage('assistant', displayText, macroData);
    chatHistory.push({ role: 'assistant', content: fullText });
    saveState();

  } catch(e) {
    hideLoading();
    appendMessage('assistant', 'Error de conexión. Intenta de nuevo.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function resetDay() {
  if (!confirm('¿Resetear todo el registro del día?')) return;
  totals = { kcal: 0, prot: 0, carbs: 0, fat: 0 };
  foodEntries = [];
  chatHistory = [];
  document.getElementById('messages').innerHTML = '';
  renderFoodLog();
  updateBars();
  showWelcome();
  saveState();
}

function showWelcome() {
  const t = TARGETS[dayType];
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `
    <div class="msg-role">kcal·ai</div>
    <div class="msg-bubble">Hola. Configurado para tu volumen pre-verano (81,1 kg → 83,5-84 kg).

Hoy es un día de <strong>${t.label.split('—')[0].trim()}</strong> → objetivo <strong>${t.kcal} kcal</strong> y <strong>${t.prot}g de proteína</strong>.

💾 <strong>Desayuno fijo guardado</strong> — escribe <em>"desayuno fijo"</em> y lo cargo automáticamente (1.257 kcal · P:51g · C:136g · G:55g).

Para lo demás, cuéntame lo que has comido y te calculo los macros al momento.</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// Init
if (loadState()) {
  setDayType(dayType);
  renderFoodLog();
  renderChatHistory();
} else {
  renderFoodLog();
  updateBars();
  showWelcome();
}
</script>
